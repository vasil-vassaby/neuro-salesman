version: "3.9"

services:
  db:
    image: postgres:16
    container_name: neuro_salesman_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: neuro_salesman_backend
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./seeds:/app/seeds:ro
      - ./rag_md_templates:/app/rag_md_templates:ro
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: neuro_salesman_frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped
